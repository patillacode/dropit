name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv --no-cache-dir

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Check formatting
        run: uv run ruff format --check app/ tests/

      - name: Run tests
        run: uv run pytest

  build:
    needs: test
    permissions:
      packages: write
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-22.04
      options: --volume /var/run/docker.sock:/var/run/docker.sock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tags
        id: meta
        shell: bash
        run: |
          FORGEJO_IMAGE=forgejo.patilla.es/patillacode/dropit
          GHCR_IMAGE=ghcr.io/patillacode/dropit
          TAGS="${FORGEJO_IMAGE}:latest,${GHCR_IMAGE}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${FORGEJO_IMAGE}:${VERSION},${GHCR_IMAGE}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        run: docker build -t dropit:scan .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy vulnerability scan
        run: trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed --format table dropit:scan

      - name: Log in to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: forgejo.patilla.es
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
