<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dropit — admin</title>
    <link rel="icon" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>

<body>
    <main class="main">
        <header class="header">
            <h1 class="logo">drop<span class="logo-dot">•</span>it</h1>
            <span class="logo-suffix">Admin</span>
        </header>

        <div class="auth-section">
            <label>API token</label>
            <div id="tokenField">
                <form class="token-input-row" id="tokenForm">
                    <input type="password" id="tokenInput" placeholder="your-api-token" autocomplete="off"
                        spellcheck="false">
                    <button type="submit" class="token-connect-btn" id="tokenConnectBtn">Connect</button>
                </form>
                <p class="token-hint" id="tokenHint" style="display:none"></p>
            </div>
            <div class="token-indicator" id="tokenIndicator" style="display:none">
                <span class="token-badge">Admin</span>
                <strong id="tokenName"></strong>
                <button class="token-change-btn" id="tokenChangeBtn">disconnect</button>
            </div>
        </div>

        <div class="error" id="errorEl"></div>

        <section class="adm-sec stats" id="stats">
            <div class="sec-head"><span class="sec-title">Overview</span><span class="sec-line"></span></div>
            <div class="stat-grid">
                <div class="stat"><strong class="stat-num" id="statTotal">0</strong><span class="stat-lbl">pages</span>
                </div>
                <div class="stat"><strong class="stat-num" id="statPermanent">0</strong><span
                        class="stat-lbl">permanent</span></div>
                <div class="stat"><strong class="stat-num" id="statSize">0 B</strong><span class="stat-lbl">total
                        size</span></div>
            </div>
        </section>

        <section class="adm-sec users-card" id="usersCard">
            <div class="sec-head"><span class="sec-title">Users</span><span class="sec-line"></span></div>
            <div class="card">
                <form class="user-create" id="userCreateForm">
                    <input type="text" id="newUserName" placeholder="username" autocomplete="off" spellcheck="false">
                    <label class="user-admin-check"><input type="checkbox" id="newUserAdmin">is admin</label>
                    <button type="submit" class="user-create-btn">Create user</button>
                </form>
                <div class="table-wrap visible" id="usersTableWrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Admin</th>
                                <th>Created</th>
                                <th class="th-actions"></th>
                            </tr>
                        </thead>
                        <tbody id="usersBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section class="adm-sec" id="pagesSection">
            <div class="sec-head"><span class="sec-title">Pages</span><span class="sec-line"></span></div>
            <div class="table-wrap" id="tableWrap">
                <table>
                    <thead>
                        <tr>
                            <th>URL</th>
                            <th>Expires</th>
                            <th>Uploaded by</th>
                            <th class="th-actions"></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="empty" id="emptyEl">No pages yet.</div>
        </section>

        <section class="adm-sec cleanup-card" id="cleanupCard">
            <div class="sec-head"><span class="sec-title">Cleanup</span><span class="sec-line"></span></div>
            <div class="card">
                <div class="cleanup-meta">
                    <div class="cleanup-meta-item">
                        <span class="cleanup-meta-key">Last run</span>
                        <span class="cleanup-meta-val" id="cleanupLastRun">—</span>
                    </div>
                    <div class="cleanup-meta-item">
                        <span class="cleanup-meta-key">Deleted</span>
                        <span class="cleanup-meta-val" id="cleanupDeletedCount">—</span>
                    </div>
                    <div class="cleanup-meta-item">
                        <span class="cleanup-meta-key">Triggered by</span>
                        <span class="cleanup-meta-val" id="cleanupTriggeredBy"></span>
                    </div>
                    <div class="cleanup-meta-item">
                        <span class="cleanup-meta-key">Next run</span>
                        <span class="cleanup-meta-val" id="cleanupNextRun">—</span>
                    </div>
                </div>
                <div class="cleanup-actions">
                    <button class="trigger-btn" id="triggerBtn">Run now</button>
                    <button class="history-toggle-btn" id="historyToggleBtn">Show history</button>
                </div>
                <div class="cleanup-history-wrap" id="cleanupHistoryWrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Ran at</th>
                                <th>Deleted</th>
                                <th>Triggered by</th>
                            </tr>
                        </thead>
                        <tbody id="cleanupHistoryBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <a href="/" class="back-link">&larr; Back to dropit</a>
    </main>

    <script src="/static/js/token-modal.js"></script>
    <script src="/static/js/admin.js"></script>
</body>

</html>
