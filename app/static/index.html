<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dropit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/index.css">
</head>

<body>
    <div class="watermark" aria-hidden="true">dropit</div>
    <div class="glow" aria-hidden="true"></div>

    <main class="main">
        <header class="header">
            <h1 class="logo">drop<span class="logo-dot">•</span>it</h1>
            <p class="tagline">HTML file sharing &mdash; ephemeral by design</p>
        </header>

        <div class="row">
            <div class="field">
                <label for="token">API token</label>
                <div id="tokenField">
                    <input type="password" id="token" placeholder="your-api-token" autocomplete="off"
                        spellcheck="false">
                    <p class="token-hint" id="tokenHint" style="display:none"></p>
                </div>
                <div class="token-indicator" id="tokenIndicator" style="display:none">
                    <span class="token-badge">Connected</span>
                    Uploading as <strong id="tokenName"></strong>
                    <button class="token-change-btn" id="tokenChangeBtn">change</button>
                </div>
            </div>
            <div class="field">
                <label for="ttl">Expires</label>
                <select id="ttl"></select>
            </div>
        </div>

        <div class="drop-zone" id="dropZone" data-state="idle">

            <div class="dz-panel dz-idle">
                <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="17 8 12 3 7 8" />
                    <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
                <p class="drop-title">Drop your HTML file here</p>
                <p class="drop-sub">or <span class="drop-accent">click to browse</span></p>
            </div>

            <div class="dz-panel dz-uploading">
                <div class="dz-spinner" aria-hidden="true"></div>
                <p class="drop-title">Uploading&hellip;</p>
            </div>

            <div class="dz-panel dz-success">
                <svg class="dz-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                <p class="dz-success-label">Live &mdash; ready to share</p>
                <div class="dz-url-row">
                    <span class="dz-url" id="dzUrl"></span>
                    <button class="dz-copy-btn" id="dzCopyBtn">Copy</button>
                </div>
                <p class="dz-expires" id="dzExpires"></p>
                <button class="dz-reset-btn" id="dzResetBtn">Upload another</button>
            </div>

            <div class="dz-panel dz-error">
                <svg class="dz-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="15" y1="9" x2="9" y2="15" />
                    <line x1="9" y1="9" x2="15" y2="15" />
                </svg>
                <p class="dz-error-msg" id="dzErrorMsg"></p>
                <p class="dz-error-hint">click to try again</p>
            </div>

        </div>
        <input type="file" id="fileInput" accept=".html,.htm">

        <div class="history" id="history">
            <div class="history-label">Recent uploads</div>
            <div id="historyList"></div>
        </div>

        <footer class="footer" id="footer">
            Self-hosted &bull;
            <a href="https://github.com/patillacode/dropit" target="_blank" rel="noopener noreferrer"
                style="color:var(--muted);text-decoration:underline;text-underline-offset:3px">Open source</a><span
                id="adminSep" style="display:none"> &bull; </span><a href="/admin" id="adminLink"
                style="display:none;color:var(--muted);text-decoration:underline;text-underline-offset:3px">Admin</a>
        </footer>
    </main>

    <script src="/static/js/index.js"></script>
</body>

</html>
