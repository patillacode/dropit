<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}dropit{% endblock %}</title>
    <meta name="theme-color" content="#09090a">
    <meta property="og:type" content="website">
    <meta property="og:title" content="drop.it">
    <meta property="og:description" content="simple html file sharing">
    <link rel="icon" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/design-tokens.css">
    <link rel="stylesheet" href="/static/css/base.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
{% block body_before %}{% endblock %}
<nav class="site-nav">
    <a href="/" class="nav-logo">drop<span class="logo-dot">•</span>it</a>
    <div class="nav-links">
        <a href="/upload" class="nav-link">Upload</a>
        <a href="/files" class="nav-link">Files</a>
        <a href="/admin" class="nav-link nav-admin" style="display:none">Admin</a>
    </div>
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
